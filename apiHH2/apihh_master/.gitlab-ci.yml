stages: #название стадии
  - validate
  - test 
  - lint

variables:
  DJANGO_SETTINGS_MODULE: "apihh_master.settings"
  VENV_PATH: ".venv"

validate-django-settings: 
  stage: validate #указываем на какой стадии будет происходить джоба
  before_script:
    - python3 -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

  script:
    - source $VENV_PATH/bin/activate
    - echo "Проверка настроек Django..."
    - python3 manage.py check
    - echo "Настройки валидны"
    - echo "Конец"

validate-migration: 
  stage: validate #указываем на какой стадии будет происходить джоба
  before_script:
    - python3 -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

  script:
    - source $VENV_PATH/bin/activate
    - echo "Проверка миграций Django..."
    - python3 manage.py makemigrations --check --dry-run
    - echo "Миграции валидны"
    - echo "Конец"

