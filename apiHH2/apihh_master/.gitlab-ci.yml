lint:
  stage: lint
  before_script:
    - python3 -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

  script:
    - source $VENV_PATH/bin/activate
    - echo "Проверка синтаксиса Django..."
    - ruff check .
    - echo "Ситаксис валиден"
    - echo "Конец"

dependecies-check:
  stage: validate
  before_script:
    - python3 -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

  script:
    - source $VENV_PATH/bin/activate
    - echo "Проверка конфликтов зависимостей Django..."
    - pip check 
    - echo "Зависимости валидны"
    - echo "Конец"

check-env-files:
  stage: validate
  before_script:
    - python3 -m venv $VENV_PATH
    - source $VENV_PATH/bin/activate
    - pip install --upgrade pip
    - pip install -r requirements.txt

  script:
    - source $VENV_PATH/bin/activate
    - echo "Проверка .env файлов..."
    - test -f ".env" 
    - echo ".env файлы проверены"